name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app-chef/**'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'URL del backend (ej: http://192.168.1.16:3001)'
        required: false
        default: 'https://bot-restaurantes.onrender.com'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-chef

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-chef/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Set backend URL
        run: |
          BACKEND_URL="${{ github.event.inputs.backend_url || 'https://bot-restaurantes.onrender.com' }}"
          echo "Usando backend: $BACKEND_URL"
          # Sobreescribir la URL en eas.json para este build
          sed -i "s|https://bot-restaurantes.onrender.com|$BACKEND_URL|g" eas.json

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_RESTAURANTE_ID: urbano
          EXPO_PUBLIC_BACKEND_URL: ${{ github.event.inputs.backend_url || 'https://bot-restaurantes.onrender.com' }}

      - name: Build APK (debug — sin keystore)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-chef-debug-${{ github.run_number }}
          path: app-chef/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
