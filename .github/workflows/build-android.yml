name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app-chef/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'URL del backend'
        required: false
        default: 'https://bot-restaurantes.onrender.com'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-chef

    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_RESTAURANTE_ID: urbano
      EXPO_PUBLIC_BACKEND_URL: ${{ github.event.inputs.backend_url || 'https://bot-restaurantes.onrender.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-chef/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install && npm install --save-dev @react-native-community/cli

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS (empaquetado standalone)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK debug (firmado automáticamente)
        run: |
          cd android
          chmod +x gradlew
          SKIP_BUNDLING=true ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: urbano-chef-${{ github.run_number }}
          path: app-chef/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
