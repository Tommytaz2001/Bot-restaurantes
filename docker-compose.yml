services:

  # ── Bot backend ───────────────────────────────────────────────────────────────
  backend:
    build: .
    container_name: bot-restaurantes
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - bot-network

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=basic
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - bot-network

  # ── ES setup: setea contraseña de kibana_system antes de arrancar Kibana ──────
  es-setup:
    image: alpine:3.19
    container_name: es-setup
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl --quiet
        echo "[es-setup] Seteando password de kibana_system..."
        RESP=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
          -u "elastic:$$ELASTIC_PASSWORD" \
          -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$$ELASTIC_PASSWORD\"}")
        echo "[es-setup] HTTP $RESP — $(cat /tmp/out.txt)"
        exit 0
    networks:
      - bot-network

  # ── Kibana ────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SERVER_NAME=kibana
      - LOGGING_ROOT_LEVEL=warn
    ports:
      - "5601:5601"
    depends_on:
      es-setup:
        condition: service_completed_successfully
    networks:
      - bot-network

  # ── Kibana setup (corre una vez y termina) ───────────────────────────────────
  kibana-setup:
    image: alpine:3.19
    container_name: kibana-setup
    depends_on:
      - kibana
      - elasticsearch
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./kibana:/setup:ro
    command: ["/bin/sh", "/setup/setup.sh"]
    restart: "no"
    networks:
      - bot-network

  # ── Filebeat (log shipper) ────────────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: filebeat
    restart: unless-stopped
    user: root
    command: filebeat -e --strict.perms=false
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./filebeat/ilm-policy.json:/usr/share/filebeat/ilm-policy.json:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bot-network

volumes:
  es_data:
  filebeat_data:

networks:
  bot-network:
    driver: bridge
